<!DOCTYPE html>
<html lang="ja" data-bs-theme="light">
<head>
    <title>AV計算機</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="/assets/bootstrap.min.css" rel="stylesheet">
    <script defer src="/assets/bootstrap.bundle.min.js"></script>
    <script src="/assets/jquery-3.6.3.min.js"></script>
    <script defer src="/assets/scripts.js"></script>
    <link rel="stylesheet" href="/assets/style.css">
<body>
    <div id="header">
        <a id="nippon" href="https://ja.m.wikipedia.org/wiki/%E6%9D%B1%E6%A2%9D%E8%8B%B1%E6%A9%9F%E3%81%AE%E9%81%BA%E8%A8%80#%E9%80%AE%E6%8D%95%E5%89%8D%E3%81%AB%E6%9B%B8%E3%81%8B%E3%82%8C%E3%81%9F%E3%81%A8%E3%81%95%E3%82%8C%E3%82%8B%E3%82%82%E3%81%AE">
            <img src="./assets/logo.svg" height="40px"></a>
    </div>

    <div id="calculator" class="container mt-4">
        <form name="formcalc" class="form">
            <div class="row mb-3 border-bottom">
                <div class="col-7 mb-3">
                    <div class="form-floating">
                        <input type="number" class="form-control" name="target_av" id="target_av" placeholder="目標とするAV">
                        <label for="target_av">目標AV(%)</label>
                    </div>
                </div>
                <div class="col-5 align-self-center mb-3">
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" role="switch" id="hande">
                        <label class="form-check-label" for="hande">ハンデ付</label>
                    </div>
                </div>
            </div>

            <div class="text-center">
                <label class="form-label">売上表からそのまま入力</label>
            </div>
            <div class="form-floating mb-3">
                <input type="number" class="form-control" name="kadou" id="kadou" placeholder="これまでの稼働時間合計" disabled>
                <label for="kadou">稼働時間(M/研除)</label>
            </div>

            <div class="row mb-4">
                <div class="col-6">
                    <div class="form-floating">
                        <input type="number" class="form-control" name="noruma_total" id="noruma_total" placeholder="これまでのノルマ合計">
                        <label for="noruma_total">基本P</label>
                    </div>
                </div>
                <div class="col-6">
                    <div class="form-floating">
                        <input type="number" class="form-control" name="uriage" id="uriage" placeholder="これまでの売上合計">
                        <label for="uriage">売上</label>
                    </div>
                </div>
            </div>
            
            <div class="text-center">
                <label class="form-label"><span>ノルマ表から合計して入力</span></label>
            </div>
            <div  class="form-floating mb-3">
                <input type="number" class="form-control" name="kadou_remaining" id="kadou_remaining" placeholder="今月残りの稼働時間合計" disabled>
                <label for="kadou_remaining">今月残りの稼働時間</label>
            </div>
            <div class="form-floating mb-3">
                <input type="number" class="form-control" name="noruma_remaining" id="noruma_remaining" placeholder="今月残りのノルマ合計">
                <label for="noruma_remaining">今月残りのノルマ</label>
            </div>

            <div class="border-top">
                <div class="form-floating mt-3">
                    <input type="text" class="form-control" name="result" id="resultField" placeholder="作る必要のある数字" readonly>
                    <label for="result">作る必要のある数字</label>
                </div>
            </div>
        </form>

        <div class="d-flex justify-content-center my-4">
            <div class="form-check">
                <input class="form-check-input" type="checkbox" value="" id="hikokumin">
                <label class="form-check-label" for="hikokumin">
                私は非国民です。
                </label>
            </div>
        </div>
    </div>
</body>
</html>
